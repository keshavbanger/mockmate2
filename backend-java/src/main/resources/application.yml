server:
  port: 8080

spring:
  application:
    name: mockmate
  config:
    import: "optional:file:.env[.properties]"
  data:
    mongodb:
      uri: ${MONGODB_URI:mongodb://localhost:27017/mockmate}
  servlet:
    multipart:
      max-file-size: 10MB
      max-request-size: 10MB

# External APIs
tavus:
  api-key: ${TAVUS_API_KEY:}
  replica-id: ${TAVUS_REPLICA_ID:r291e545fd67}
sarvam:
  api-key: ${SARVAM_API_KEY:}
gemini:
  api-key: ${GEMINI_API_KEY:}
groq:
  api-key: ${GROQ_API_KEY:}
