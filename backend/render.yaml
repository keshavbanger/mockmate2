services:
  - type: web
    name: mockmate-backend
    runtime: python
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: MONGODB_URI
        sync: false
      - key: MONGODB_DB
        value: keiyeta
      - key: GEMINI_API_KEY
        sync: false
      - key: TAVUS_API_KEY
        sync: false
      - key: TAVUS_REPLICA_ID
        value: rf4e9d9790f0
      - key: JWT_SECRET
        generateValue: true
      - key: CORS_ORIGINS
        sync: false
      - key: SESSION_TTL_SECONDS
        value: "7200"
      - key: MAX_RESUME_SIZE_MB
        value: "5"
